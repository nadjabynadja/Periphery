# Periphery RSS Ingest — Default Feed Configuration
# Each feed has: url, category, poll_interval (seconds), priority (1=highest, 5=lowest)

feeds:
  # ── Government & Regulatory ──────────────────────────────────────────
  - url: "https://www.federalregister.gov/documents/search.atom"
    name: "US Federal Register"
    category: "government"
    poll_interval: 600
    priority: 2

  - url: "https://ofac.treasury.gov/system/files/126/ofac_rss.xml"
    name: "OFAC Sanctions Updates"
    category: "sanctions"
    poll_interval: 900
    priority: 1

  - url: "https://www.consilium.europa.eu/en/press/press-releases/rss/?category=sanctions"
    name: "EU Council Sanctions"
    category: "sanctions"
    poll_interval: 900
    priority: 1

  - url: "https://efts.sec.gov/LATEST/search-index?q=%22&dateRange=custom&startdt=2024-01-01&forms=10-K,10-Q,8-K&rss=true"
    name: "SEC EDGAR Filings"
    category: "government"
    poll_interval: 600
    priority: 2

  - url: "https://www.govinfo.gov/rss/uscourts.xml"
