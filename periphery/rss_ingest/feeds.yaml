###############################################################################
# OSINT INTELLIGENCE PLATFORM — RSS/ATOM FEED CONFIGURATION
# Generated: 2026-03-11
# Total Active Feeds: 150
# Known RSS Gaps: Reuters, AP, OFAC, FATF, BIS, ACLED, Janes, Liveuamap,
#                 SSRN, Lloyd's List, Flexport (workarounds documented)
#
# PRIORITY KEY:
#   1 = Critical / Breaking (immediate analyst alert)
#   2 = Important / Daily (morning brief inclusion)
#   3 = Standard (routine monitoring)
#   4 = Background (weekly review)
#   5 = Supplementary (research reference)
#
# POLL INTERVAL KEY:
#   300s  = 5 min  (breaking news, CVE alerts)
#   600s  = 10 min (daily news sources)
#   1800s = 30 min (analysis, think tanks)
#   3600s = 1 hr   (academic, regulatory, slow-publishing)
###############################################################################

rate_limits:
  defaults:
    requests_per_second: 0.1
    burst_size: 3
    max_concurrent_per_domain: 2

  overrides:
    # --- US Government / Military (be very polite) ---
    "defense.gov":
