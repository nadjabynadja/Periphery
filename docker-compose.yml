services:
  # ─── API Server (query serving, crystallizer, WebSocket) ───
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "periphery.main:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "info"]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - /root/Civic-Voice/data:/app/civicvoice
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - EXA_API_KEY=${EXA_API_KEY:-}
      - SKYFI_API_KEY=${SKYFI_API_KEY:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - DB_ANALYTICAL_PATH=/app/data/analytical.db
      - VOTER_DB_PATH=/app/civicvoice/voter.db
      - FINANCE_DB_PATH=/app/civicvoice/finance.db
      - PIPELINE_DB_PATH=/app/data/analytical.db
      - CRYSTALLIZER_DB_PATH=/app/data/analytical.db
      - GEOTAG_DB_PATH=/app/data/geotag_embeddings.db
      - ENRICHMENT_GEOCODE_CACHE_DB=/app/data/geocoding_cache.db
      - ENRICHMENT_GEONAMES_DB=/app/data/geonames.db
      - ENRICHMENT_GEOSPATIAL_SEED_FILE=/app/data/geospatial_seeds.json
      - ENRICHMENT_PHOTON_BASE_URL=http://photon:2322
      - FAISS_INDEX_PATH=/app/data/faiss/index.bin
      - EMBEDDING_INDEX_DIR=/app/data/indices
      - N2YO_API_KEY=${N2YO_API_KEY:-}
      - POSITION_API_URL=http://position-api:5050
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000,https://kestralsaber.prphry.com}
    env_file:
      .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  # ─── Enrichment Pipeline (shared consumer: enrichment → embedding → crystallization) ───
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "periphery.pipeline"]
    volumes:
      - ./data:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - EXA_API_KEY=${EXA_API_KEY:-}
      - DB_RSS_PATH=/app/data/rss.db
      - DB_GDELT_PATH=/app/data/gdelt.db
      - DB_SANCTIONS_PATH=/app/data/sanctions.db
      - DB_ANALYTICAL_PATH=/app/data/analytical.db
      - PIPELINE_DB_PATH=/app/data/analytical.db
      - CRYSTALLIZER_DB_PATH=/app/data/analytical.db
      - GEOTAG_DB_PATH=/app/data/geotag_embeddings.db
      - ENRICHMENT_GEOCODE_CACHE_DB=/app/data/geocoding_cache.db
      - ENRICHMENT_GEONAMES_DB=/app/data/geonames.db
      - ENRICHMENT_GEOSPATIAL_SEED_FILE=/app/data/geospatial_seeds.json
      - ENRICHMENT_PHOTON_BASE_URL=http://photon:2322
      - FAISS_INDEX_PATH=/app/data/faiss/index.bin
      - EMBEDDING_INDEX_DIR=/app/data/indices
      # Disable source polling in pipeline — sources run as separate services
      - SOURCES_ENABLED=false
      - ENRICHMENT_HIGH_PRIORITY_RESERVED_SLOTS=25
    env_file:
      .env
    restart: unless-stopped
    # Medium CPU priority — pipeline is CPU-bound for embeddings
    cpu_shares: 768
    depends_on:
      backend:
        condition: service_healthy

  # ─── Priority 1: GDELT (global news, 15-min cycle, time-sensitive) ───
  ingest-gdelt:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "periphery.ingest.sources.runner", "--source", "gdelt_doc"]
    volumes:
      - ./data:/app/data
    environment:
      - DB_GDELT_PATH=/app/data/gdelt.db
      - PIPELINE_DB_PATH=/app/data/analytical.db
      - GDELT_ENABLED=true
      - GDELT_POLL_INTERVAL=900
      - GDELT_MAX_ARTICLES_PER_QUERY=75
    env_file:
      .env
    restart: unless-stopped
    # Highest CPU share — GDELT is priority 1
    cpu_shares: 1024
    mem_limit: 512m
    depends_on:
      backend:
        condition: service_healthy

  # ─── Priority 2: RSS (feed monitoring, 5-min default cycle) ───
  ingest-rss:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "periphery.ingest.sources.runner", "--source", "rss"]
    volumes:
      - ./data:/app/data
    environment:
      - DB_RSS_PATH=/app/data/rss.db
      - PIPELINE_DB_PATH=/app/data/analytical.db
      - RSS_ENABLED=true
      - RSS_FETCH_FULL_ARTICLES=true
    env_file:
      .env
    restart: unless-stopped
    cpu_shares: 768
    mem_limit: 1g
    depends_on:
      backend:
        condition: service_healthy

  # ─── Priority 3: OFAC (sanctions lists, daily cycle) ───
  ingest-ofac:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "periphery.ingest.sources.runner", "--source", "ofac_sanctions"]
    volumes:
      - ./data:/app/data
    environment:
      - DB_SANCTIONS_PATH=/app/data/sanctions.db
      - PIPELINE_DB_PATH=/app/data/analytical.db
      - OFAC_ENABLED=true
      - OFAC_POLL_INTERVAL=86400
      - OFAC_INCLUDE_CONSOLIDATED=true
    env_file:
      .env
    restart: unless-stopped
    cpu_shares: 512
    mem_limit: 512m
    depends_on:
      backend:
        condition: service_healthy

  # ─── Priority 4: ICIJ (offshore leaks, weekly cycle, large ZIP) ───
  ingest-icij:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "periphery.ingest.sources.runner", "--source", "icij_offshore"]
    volumes:
      - ./data:/app/data
    environment:
      - DB_SANCTIONS_PATH=/app/data/sanctions.db
      - PIPELINE_DB_PATH=/app/data/analytical.db
      - ICIJ_ENABLED=true
      - ICIJ_POLL_INTERVAL=604800
      - ICIJ_NODE_TYPES=entities,officers,intermediaries
      - ICIJ_DATA_DIR=/app/data
    env_file:
      .env
    restart: unless-stopped
    # Lowest CPU share — ICIJ is priority 4, bulk historical data
    cpu_shares: 256
    mem_limit: 2g
    depends_on:
      backend:
        condition: service_healthy

  # ─── Priority 2: OpenSky (ADS-B aircraft tracking, 30s poll) ───
  ingest-opensky:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "periphery.ingest.sources.runner", "--source", "opensky"]
    volumes:
      - ./data:/app/data
    environment:
      - DB_ANALYTICAL_PATH=/app/data/analytical.db
      - PIPELINE_DB_PATH=/app/data/analytical.db
      - OPENSKY_BBOX=24.5,-125.0,49.5,-66.0
      - OPENSKY_POLL_INTERVAL=30
    env_file:
      .env
    restart: unless-stopped
    cpu_shares: 512
    mem_limit: 256m
    depends_on:
      backend:
        condition: service_healthy

  # ─── Priority 2: Maritime AIS (vessel tracking, 60s poll) ───
  ingest-maritime:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "periphery.ingest.sources.runner", "--source", "maritime"]
    volumes:
      - ./data:/app/data
    environment:
      - DB_ANALYTICAL_PATH=/app/data/analytical.db
      - PIPELINE_DB_PATH=/app/data/analytical.db
      - POSITION_API_URL=http://position-api:5050
      - MARITIME_POLL_INTERVAL=60
    env_file:
      .env
    restart: unless-stopped
    cpu_shares: 512
    mem_limit: 256m
    depends_on:
      backend:
        condition: service_healthy
      position-api:
        condition: service_started

  # ─── Priority 4: CelesTrak (satellite TLE, hourly poll) ───
  ingest-celestrak:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "periphery.ingest.sources.runner", "--source", "celestrak"]
    volumes:
      - ./data:/app/data
    environment:
      - DB_ANALYTICAL_PATH=/app/data/analytical.db
      - PIPELINE_DB_PATH=/app/data/analytical.db
      - CELESTRAK_POLL_INTERVAL=3600
    env_file:
      .env
    restart: unless-stopped
    cpu_shares: 256
    mem_limit: 256m
    depends_on:
      backend:
        condition: service_healthy

  # ─── Frontend ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_MAPBOX_ACCESS_TOKEN: ${VITE_MAPBOX_ACCESS_TOKEN}
        VITE_API_BASE_URL: ""
        VITE_AUTH_ENABLED: "true"
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped

  # ─── Photon Geocoder ───
  photon:
    image: rtuszik/photon-docker:latest
    ports:
      - "127.0.0.1:2322:2322"
    volumes:
      - photon-data:/photon/data
    environment:
      - UPDATE_STRATEGY=DISABLED
    restart: unless-stopped

  # ─── Position API (ADS-B + AIS tracking) ───
  position-api:
    build:
      context: /root/position-api
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5050:5050"
    environment:
      - PORT=5050
    env_file:
      .env
    restart: unless-stopped

volumes:
  photon-data:
    driver: local
